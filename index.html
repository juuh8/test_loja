<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Loja</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1 id="titulo">Loja de Biquínis</h1>

  <!-- Idiomas -->
  <select onchange="mudarIdioma(this.value)">
    <option value="pt">Português</option>
    <option value="en">English</option>
    <option value="es">Español</option>
  </select>

  <!-- Painel vendedor -->
  <button onclick="abrirPainel()">🔒 Vendedor</button>
</header>

<!-- Carrinho -->
<div id="carrinho">
  <h3 id="carrinhoTitulo">Carrinho</h3>
  <ul id="lista-carrinho"></ul>
  <p><strong id="totalTexto">Total: </strong><span id="total">0</span></p>
</div>

<!-- Produtos -->
<div class="container" id="produtos"></div>

<!-- Painel -->
<div id="painel" style="display:none;">
  <h2>Painel do Vendedor</h2>

  <input id="nome" placeholder="Nome">
  <input id="preco" placeholder="Preço" type="number">
  <input id="imagem" placeholder="URL da imagem">
  <input id="tamanhos" placeholder="Tamanhos (P,M,G)">

  <button onclick="adicionarProduto()">Adicionar Produto</button>
  <button onclick="fecharPainel()">Fechar</button>
</div>

<script src="script.js"></script>
</body>
</html>
